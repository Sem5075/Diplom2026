apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: my-app
  namespace: default
spec:
  parentRefs:
    - group: gateway.networking.k8s.io	
      kind: Gateway
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames:
    - app.semops.duckdns.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ''	
          kind: Service
        - name: testapp
          port: 80
          weight: 1