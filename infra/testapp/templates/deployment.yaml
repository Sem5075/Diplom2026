apiVersion: apps/v1
kind: Deployment

metadata:
  name: testapp
  namespace: testapp

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: testapp

  template:
    metadata:
      labels:
        app: testapp

    spec:
      containers:
        - name: testapp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          ports:
            - containerPort: 8080

          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace